<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Falsafa Quizzz - To'liq Tizim</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color-card: rgba(255, 255, 255, 0.1); 
            --text-color: #ffffff;
            --button-color-primary: #a100ff;
            --correct-color: #4CAF50;
            --wrong-color: #F44336;
            --border-radius-main: 15px;
            --border-radius-btn: 10px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px; display: flex; justify-content: center;
            align-items: center; min-height: 100vh; color: var(--text-color);
            background-color: #000; overflow: hidden;
        }

        #bg-video {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: contain; z-index: -2; background-color: #000;
        }

        .video-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, rgba(26,1,42,0.6) 0%, rgba(0,0,0,0.7) 100%);
            z-index: -1;
        }

        #sound-toggle {
            position: fixed; top: 20px; right: 20px; background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4); color: white; width: 45px; height: 45px;
            border-radius: 50%; cursor: pointer; z-index: 10; display: flex; justify-content: center; align-items: center;
        }

        .container {
            width: 100%; max-width: 400px; background: var(--bg-color-card);
            border-radius: var(--border-radius-main); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2); padding: 25px; box-sizing: border-box;
            text-align: center; z-index: 1; position: relative;
        }

        .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .category-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
        }

        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .timer-container { width: 45px; height: 45px; position: relative; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .timer-fill { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: conic-gradient(var(--button-color-primary) var(--timer-p, 360deg), transparent 0deg); }
        .timer-text { position: relative; z-index: 1; font-weight: bold; }

        .option-btn {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer;
            text-align: left; position: relative; font-size: 16px;
        }
        .option-btn.correct { background-color: var(--correct-color); }
        .option-btn.wrong { background-color: var(--wrong-color); }

        .primary-btn {
            width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold;
            cursor: pointer; background: linear-gradient(90deg, #7b2cbf, #a100ff); color: #fff; margin-top: 10px;
        }

        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div style="font-size: 24px; color: #a100ff;">Yuklanmoqda...</div>
        <div style="margin-top: 10px;" id="loading-status">Savollar bazasi tayyorlanmoqda</div>
    </div>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="VID_20260418_105222_797.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
    <button id="sound-toggle" onclick="toggleSound()">🔇</button>

    <div class="container" id="category-selection" style="display:none;">
        <h2>Falsafa Quizzz</h2>
        <div class="category-grid" id="menu-grid"></div>
        <button class="primary-btn" onclick="checkCertificate()" style="background: #ffd700; color: #000;">🎓 Sertifikat olish</button>
    </div>

    <div class="container" id="quiz-container" style="display:none;">
        <div class="status-bar">
            <h3 id="progress">1 / 50</h3>
            <div class="timer-container">
                <div class="timer-fill" id="timer-fill"></div>
                <div class="timer-text" id="timer-text">30</div>
            </div>
        </div>
        <div id="question" style="font-size: 18px; margin-bottom: 20px; font-weight: bold; line-height: 1.4;"></div>
        <div id="options"></div>
    </div>

    <div class="container" id="result-container" style="display:none;">
        <h2>Bo'lim yakunlandi!</h2>
        <div id="session-score" style="font-size: 24px; margin: 20px 0;"></div>
        <button class="primary-btn" onclick="showMenu()">Menyuga qaytish</button>
    </div>

    <div class="container" id="cert-name-input" style="display:none;">
        <h2 style="color: #ffd700;">Tabriklaymiz! 🎉</h2>
        <p>Sertifikat uchun ism-familiyangizni kiriting:</p>
        <input type="text" id="user-name" style="width:100%; padding:15px; border-radius:10px; margin-bottom:20px; border:none; text-align:center; font-size: 16px;" placeholder="Ism Familiya">
        <button class="primary-btn" onclick="generateFinalCert()">Yaratish</button>
    </div>

    <div class="container" id="certificate-display" style="display:none; border: 2px solid #ffd700; background: rgba(0,0,0,0.85);">
        <h1 style="color: #ffd700;">🏆 SERTIFIKAT 🏆</h1>
        <div id="cert-content" style="margin: 30px 0; line-height: 1.6;"></div>
        <button class="primary-btn" onclick="tg.close()">Rahmat!</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let allSections = [];
        let currentSectionIndex = 0;
        let currentQuestionIndex = 0;
        let correctCount = 0;
        let timer;
        let timeLeft = 30;

        async function loadAndParseQuestions() {
            try {
                // To'g'ri havola
                const nocacheUrl = 'falsafa.txt?v=' + new Date().getTime();
                const response = await fetch(nocacheUrl);
                
                if (!response.ok) throw new Error("Fayl serverdan topilmadi!");
                
                const text = await response.text();
                const lines = text.split('\n').map(l => l.trim()).filter(l => l !== "");
                
                let questions = [];
                for (let i = 0; i < lines.length; i++) {
                    // Xatolar to'g'rilangan tozalash kodi
                    let line = lines[i].replace(/\/g, '').trim();
                    
                    if (/^\d+/.test(line)) {
                        let qObj = {
                            q: line.replace(/^\d+\s*/, '').trim(),
                            options: [],
                            answer: ""
                        };
                        for (let j = 1; j <= 4; j++) {
                            if (i + j < lines.length) {
                                let optLine = lines[i+j].replace(/\/g, '').trim();
                                let opt = optLine.replace(/^[A-D]\s*/, '').trim();
                                if (opt.includes("#")) {
                                    opt = opt.replace("#", "").trim();
                                    qObj.answer = opt;
                                }
                                qObj.options.push(opt);
                            }
                        }
                        if(qObj.options.length === 4) {
                            questions.push(qObj);
                        }
                        i += 4;
                    }
                }

                // 10 bo'limga avtomatik bo'lish
                allSections = [];
                let size = Math.ceil(questions.length / 10);
                if(size === 0) size = 50; 
                
                for (let i = 0; i < 10; i++) {
                    if (questions.slice(i * size, (i + 1) * size).length > 0) {
                        allSections.push(questions.slice(i * size, (i + 1) * size));
                    }
                }

                document.getElementById('loading-screen').style.display = 'none';
                showMenu();

            } catch (e) {
                console.error(e);
                document.getElementById('loading-status').innerHTML = `<span style="color:#F44336;">Xatolik: falsafa.txt faylini o'qib bo'lmadi!</span>`;
            }
        }

        function showMenu() {
            hideAll();
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            allSections.forEach((s, index) => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.innerHTML = `<span>📂</span> Bo'lim ${index + 1}`;
                btn.onclick = () => startSection(index);
                grid.appendChild(btn);
            });
            document.getElementById('category-selection').style.display = 'block';
        }

        function startSection(index) {
            currentSectionIndex = index;
            currentQuestionIndex = 0;
            correctCount = 0;
            hideAll();
            document.getElementById('quiz-container').style.display = 'block';
            
            // Videoni yoqish
            const video = document.getElementById('bg-video');
            if (video.muted) { video.muted = false; document.getElementById('sound-toggle').innerText = '🔊'; }

            loadQuestion();
        }

        function loadQuestion() {
            clearInterval(timer);
            timeLeft = 30;
            updateTimerUI();
            
            const q = allSections[currentSectionIndex][currentQuestionIndex];
            const secLen = allSections[currentSectionIndex].length;
            document.getElementById('progress').innerText = `${currentQuestionIndex + 1} / ${secLen}`;
            document.getElementById('question').innerText = q.q;
            
            const optsDiv = document.getElementById('options');
            optsDiv.innerHTML = '';
            [...q.options].sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, q.answer, btn);
                optsDiv.appendChild(btn);
            });

            timer = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    nextQuestion();
                }
            }, 1000);
        }

        function checkAnswer(selected, correct, btn) {
            clearInterval(timer);
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.disabled = true);

            if (selected === correct) {
                btn.classList.add('correct');
                correctCount++;
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else {
                btn.classList.add('wrong');
                btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            }
            setTimeout(nextQuestion, 1200);
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < allSections[currentSectionIndex].length) loadQuestion();
            else finishSection();
        }

        function finishSection() {
            hideAll();
            document.getElementById('result-container').style.display = 'block';
            const secLen = allSections[currentSectionIndex].length;
            document.getElementById('session-score').innerText = `${secLen} tadan ${correctCount} ta to'g'ri!`;
            
            let scores = JSON.parse(localStorage.getItem('falsafa_scores') || '{}');
            if (!scores[currentSectionIndex] || correctCount > scores[currentSectionIndex]) {
                scores[currentSectionIndex] = correctCount;
                localStorage.setItem('falsafa_scores', JSON.stringify(scores));
            }
        }

        function checkCertificate() {
            let scores = JSON.parse(localStorage.getItem('falsafa_scores') || '{}');
            let totalCorrect = Object.values(scores).reduce((a, b) => a + b, 0);
            
            let totalQuestionsInApp = 0;
            allSections.forEach(sec => totalQuestionsInApp += sec.length);
            if(totalQuestionsInApp === 0) totalQuestionsInApp = 500;

            let percent = (totalCorrect / totalQuestionsInApp) * 100;

            if (percent >= 70) {
                hideAll();
                document.getElementById('cert-name-input').style.display = 'block';
                window.currentPercent = percent;
            } else {
                alert(`Sertifikat uchun barcha savollarning kamida 70% ini to'g'ri topishingiz kerak!\n\nSizning umumiy natijangiz: ${percent.toFixed(1)}%`);
            }
        }

        function generateFinalCert() {
            const name = document.getElementById('user-name').value;
            if (!name) return alert("Ismni kiriting!");
            
            let p = window.currentPercent;
            let deg = p >= 100 ? "1-darajali" : p >= 90 ? "2-darajali" : p >= 80 ? "3-darajali" : "4-darajali";
            
            hideAll();
            document.getElementById('cert-content').innerHTML = `
                <h2 style="text-transform: uppercase;">Tabriklaymiz, <br><span style="color:#ffd700;">${name}</span>!</h2>
                <p>Biz bilan bo'lganingiz uchun rahmat! <br> Siz testlarning <b>${p.toFixed(1)}%</b> qismini to'g'ri ishlaganingiz uchun</p>
                <h3 style="color:#ffd700; font-size:24px; margin: 15px 0;">${deg}</h3>
                <p>sertifikatga loyiq ko'rildingiz!</p>
            `;
            document.getElementById('certificate-display').style.display = 'block';
        }

        function updateTimerUI() {
            document.getElementById('timer-text').innerText = timeLeft;
            document.getElementById('timer-fill').style.setProperty('--timer-p', `${(timeLeft/30)*360}deg`);
        }

        function toggleSound() {
            const v = document.getElementById('bg-video');
            v.muted = !v.muted;
            document.getElementById('sound-toggle').innerText = v.muted ? '🔇' : '🔊';
        }

        function hideAll() {
            ['category-selection','quiz-container','result-container','cert-name-input','certificate-display']
            .forEach(id => document.getElementById(id).style.display = 'none');
        }

        window.onload = loadAndParseQuestions;
    </script>
</body>
</html>
